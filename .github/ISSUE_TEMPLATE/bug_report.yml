name: Bug report / Bug 反馈
description: Report something broken or confusing. / 反馈异常或容易误解的问题。
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
        感谢反馈问题。

        Do not include NGA Cookie values, bot tokens, webhook URLs, email passwords, or other secrets.
        请不要提交 NGA Cookie、机器人 Token、Webhook URL、邮箱密码或其他敏感信息。
  - type: textarea
    id: summary
    attributes:
      label: Summary / 问题概述
      description: What happened? / 发生了什么？
      placeholder: The watcher failed to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: List the smallest set of steps that triggers the issue. / 请列出能触发问题的最小步骤。
      placeholder: |
        1. Configure...
        2. Run...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
      description: What did you expect to happen? / 你原本预期会发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
      description: What happened instead? / 实际发生了什么？
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime / 运行方式
      options:
        - Windows installer / Windows 安装版
        - Windows portable / Windows 便携版
        - Linux one-command install / Linux 一行安装
        - Source / CLI / 源码或 CLI
        - Other / 其他
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: Release version, commit hash, or "latest main". / Release 版本、提交哈希，或 latest main。
      placeholder: v1.5.6
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Paste relevant logs after removing secrets. / 请先移除敏感信息，再粘贴相关日志。
      render: text
