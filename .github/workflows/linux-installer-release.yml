name: Upload Linux installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-linux-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install-linux.sh release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          chmod +x tools/install-linux.sh
          gh release upload "$RELEASE_TAG" tools/install-linux.sh#install-linux.sh --clobber
